<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="stylesheet" href="style/styles.css">
  <script src="js/clicker.js" defer></script>
</head>
<body>
  <main class="container">
    <!-- Partie gauche : bloc à cliquer -->
    <section class="left">
      <img src="asset/item/titre.png" alt="Titre du jeu" width="300px" height="300px" id="titre"/>
      <h2 id="counter">0</h2>
      <p id="cps">0 clics </p>
      <div id="block" class="clickable">
        <img src="asset/block/p.png" width="200" height="200" />
      </div>
      
     
    </section>

    <!-- Partie droite : boutique -->
    <aside class="right">
      <h2>Améliorations</h2>
        <button id="son"><img src="asset/item/jukebox.gif" /></button>
        <audio id="audio" src="musicmincraft.mp3"></audio>
        <button id="reset" class="reset-btn">
          <img src="asset/item/bloc-tnt-minecraft.png" height="100" width="100" />
        </button>
      <div class="boutique">
        <button id="fer"><img src="asset/item/mi.png" /><br>2 clics<br>30 gold</button>
        <button id="or"><img src="asset/item/min.png" /><br>4 clics<br>50 gold</button>
        <button id="diamant"><img src="asset/item/mpiochediamant.png" /><br>8 clics<br>80 gold</button>
        <button id="netherite"><img src="asset/item/mine.png" /><br>16 clics<br>110 gold</button>
        <button id="hachefer"><img src="asset/item/hf.png" /><br>32 clics<br>220 gold</button>
        <button id="hacheor"><img src="asset/item/ho.png" /><br>64 clics<br>440 gold</button>
        <button id="hachediamant"><img src="asset/item/hd.png" /><br>128 clics<br>880 gold</button>
        <button id="hachenetherite"><img src="asset/item/hn.png" /><br>256 clics<br>1760 gold</button>
        <button id="epeefer"><img src="asset/item/sf.png" /><br>464 clics<br>3520 gold</button>
        <button id="epeeor"><img src="asset/item/so.png" /><br>928 clics<br>7040 gold</button>
        <button id="epeediamant"><img src="asset/item/sd.png" /><br>1856 clics<br>14080 gold</button>
        <button id="epeenetherite"><img src="asset/item/sn.png" /><br>3712 clics<br>28160 gold</button>
      </div>
    </aside>
  </main>
</body>
</html>
